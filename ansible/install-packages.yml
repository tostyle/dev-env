---
- name: Install packages similar to home.packages
  hosts: localhost
  connection: local
  become: true
  gather_facts: true

  vars:
    # Mirrors the cross-platform packages from home.nix where possible.
    common_packages:
      - ripgrep
      - jq
      - curl
      - htop
      - podman
      - nodejs
      - gh
      - direnv


  tasks:
    # - name: Install common system packages
    #   ansible.builtin.package:
    #     name: "{{ common_packages }}"
    #     state: present

    - name: Check if pi-coding-agent is already installed globally
      ansible.builtin.command: npm list -g --depth=0 @earendil-works/pi-coding-agent
      register: pi_coding_agent_check
      changed_when: false
      failed_when: false
      become: false

    - name: Install pi-coding-agent globally via npm
      ansible.builtin.command: npm install -g --ignore-scripts @earendil-works/pi-coding-agent
      when: pi_coding_agent_check.rc != 0
      become: false

    - name: Check if typescript is already installed globally
      ansible.builtin.command: npm list -g --depth=0 typescript
      register: typescript_check
      changed_when: false
      failed_when: false
      become: false

    - name: Install typescript globally via npm
      ansible.builtin.command: npm install -g typescript
      when: typescript_check.rc != 0
      become: false

