---
# ssh-keys.yml — generate SSH keys for this machine
# Run standalone: ansible-playbook ansible/ssh-keys.yml

- name: SSH key setup
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    ssh_dir: "{{ lookup('env', 'HOME') }}/.ssh-local"
    ssh_config: "{{ lookup('env', 'HOME') }}/.ssh"
    coder_key: "{{ ssh_dir }}/id_coder"

  tasks:
    - name: Ensure ~/.ssh-local exists with correct permissions
      ansible.builtin.file:
        path: "{{ ssh_dir }}"
        state: directory
        mode: "0700"

    - name: Check if id_coder key already exists
      ansible.builtin.stat:
        path: "{{ coder_key }}"
      register: key_stat

    - name: Generate id_coder ed25519 SSH key
      ansible.builtin.command:
        cmd: ssh-keygen -t ed25519 -f {{ coder_key }} -N "" -C id_coder
      when: not key_stat.stat.exists
      register: keygen

    - name: Configure ~/.ssh-local/config for GitHub
      ansible.builtin.blockinfile:
        path: "{{ ssh_config }}/config"
        create: true
        mode: "0600"
        marker: "# {mark} ANSIBLE MANAGED — github.com"
        block: |
          Host github.com
            Hostname github.com
            User git
            IdentityFile ~/.ssh-local/id_coder
            IdentitiesOnly yes
    - name: Change permission of private key files to 600
      ansible.builtin.file:
        path: "{{ coder_key }}"
        mode: "0600"
    - name: Change permission of public key file to 644
      ansible.builtin.file:
        path: "{{ coder_key }}.pub"
        mode: "0644"

    - name: Read public key
      ansible.builtin.command:
        cmd: cat {{ coder_key }}.pub
      register: pubkey
      changed_when: false

    - name: "Public key (add to GitHub / GitLab / authorized_keys as needed)"
      ansible.builtin.debug:
        msg: "{{ pubkey.stdout }}"
