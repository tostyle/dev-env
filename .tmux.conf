# Tmux Configuration File

# =============================================================================
# PREFIX KEY (set FIRST — before plugins and key bindings)
# =============================================================================

# Unbind the default prefix first
unbind C-b

# Set the primary prefix to Ctrl + a
set -g prefix C-a

# Set a secondary prefix to Ctrl + b (this keeps both alive)
set -g prefix2 C-b

# Ensure you can still send the commands to inner apps (nested tmux)
bind C-a send-prefix
bind C-b send-prefix

# =============================================================================
# PLUGIN CONFIGURATION
# =============================================================================

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# tmux-continuum configuration
set -g @continuum-restore 'on'
set -g @continuum-save-interval '1'
set -g @continuum-boot 'on'
set -g status-right 'Continuum status: #{continuum_status}'

# =============================================================================
# KEY BINDINGS FOR SESSION MANAGEMENT
# =============================================================================

# Quick session save and restore
bind C-s run-shell "~/.tmux/plugins/tmux-resurrect/scripts/save.sh"
bind C-r run-shell "~/.tmux/plugins/tmux-resurrect/scripts/restore.sh"

# =============================================================================
# COPY MODE (vi keys + system clipboard)
# =============================================================================

# Use vi-style keys in copy mode (Prefix + [ to enter, Prefix + ] to paste)
set -g mode-keys vi

# Enable OSC 52 clipboard — works over SSH with modern terminals (tmux 3.3+)
set -g set-clipboard on

# v to begin visual selection (like Vim)
bind -T copy-mode-vi v send-keys -X begin-selection

# y to yank (copy) selection to system clipboard
# Tries pbcopy (macOS), then xclip (Linux X11), then wl-copy (Linux Wayland)
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \
  "if command -v pbcopy >/dev/null 2>&1; then pbcopy; \
    elif command -v xclip >/dev/null 2>&1; then xclip -selection clipboard; \
    elif command -v wl-copy >/dev/null 2>&1; then wl-copy; \
    else cat > /dev/null; fi"

# =============================================================================
# MOUSE SUPPORT
# =============================================================================

set -g mouse on

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'